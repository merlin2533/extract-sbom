name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  release-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Set up Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version: '1.26'

      - name: Build Linux amd64 release candidate
        env:
          VERSION: ${{ github.ref_type == 'tag' && github.ref_name || format('dev-{0}', github.sha) }}
        run: |
          mkdir -p dist
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
            go build -trimpath -ldflags "-s -w -X github.com/TomTonic/extract-sbom/internal/buildinfo.ReleaseVersion=${VERSION}" \
            -o dist/extract-sbom-linux-amd64 ./cmd/extract-sbom

      - name: Build release-test container
        run: docker build -f .github/release-test/Dockerfile -t extract-sbom-release-test:${{ github.sha }} .

      - name: Run release-test in container
        run: docker run --rm extract-sbom-release-test:${{ github.sha }}

  publish:
    runs-on: ubuntu-latest
    needs: release-test
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version: '1.26'

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7.2.1
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
