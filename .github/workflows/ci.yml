name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.26']
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Set up Go ${{ matrix.go-version }}
        uses: actions/setup-go@v6.4.0
        with:
          go-version: ${{ matrix.go-version }}

      - name: Test with coverage
        run: |
          COVER_PKGS=$(go list ./... | grep -v '^github.com/TomTonic/extract-sbom/integration/releasetest$')
          go test -coverprofile=coverage.out $COVER_PKGS -count=1 -timeout 120s

      - name: Show coverage
        run: go tool cover -func=coverage.out

      - name: Enforce coverage threshold
        run: |
          total=$(go tool cover -func=coverage.out | awk '/^total:/{gsub(/%/,""); print $3}')
          echo "Total coverage: ${total}%"
          awk -v t="$total" 'BEGIN {
            if (t+0 < 75) {
              printf "FAIL: coverage %.1f%% is below the 75%% minimum threshold\n", t+0
              exit 1
            }
            printf "PASS: coverage %.1f%% meets threshold (>= 75%%)\n", t+0
          }'

      - name: Test with race detector
        run: go test -race ./cmd/... ./internal/... -count=1 -timeout 180s

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Set up Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version: '1.26'

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9.2.0
        with:
          version: latest

  release-checks:
    runs-on: ubuntu-latest
    needs: [build, lint]
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Set up Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version: '1.26'

      - name: Install external tools for release test
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends jq 7zip unshield

      - name: Build release candidate for release tests
        run: |
          mkdir -p dist
          go build -trimpath -o dist/extract-sbom-ci ./cmd/extract-sbom

      - name: Test-run release integration test script
        env:
          RELEASE_TEST_CANDIDATE: ${{ github.workspace }}/dist/extract-sbom-ci
        run: go test ./integration/releasetest -run TestReleaseScriptIntegration -count=1 -timeout 180s
