version: "2"

run:
  timeout: 3m

linters:
  default: none
  enable:
    - bodyclose
    - errcheck
    - gocritic
    - gosec
    - govet
    - ineffassign
    - misspell
    - nakedret
    - revive
    - staticcheck
    - unconvert
    - unparam
    - unused
    - whitespace
  settings:
    govet:
      enable:
        - shadow
    nakedret:
      max-func-lines: 30
    gocritic:
      enabled-checks:
        - appendCombine
        - dupImport
        - emptyStringTest
        - equalFold
        - indexAlloc
        - nestingReduce
        - nilValReturn
        - rangeExprCopy
        - rangeValCopy
        - sloppyReassign
        - unnecessaryBlock

  # TODO: Add project-specific exclusions here if needed.
  # exclusions:
  #   paths:
  #     - generated/

  exclusions:
    rules:
      # German translations are intentional, not misspellings.
      - linters: [misspell]
        path: internal/report/
      # File paths are validated by safeguard before opening.
      - linters: [gosec]
        text: "G304"
      # Subprocess execution is the designed purpose of the sandbox module.
      - linters: [gosec]
        text: "G204"
        path: internal/sandbox/
      # Subprocess execution is the designed purpose of the release integration test.
      - linters: [gosec]
        text: "G204"
        path: integration/releasetest/
      # Best-effort cleanup: Close on read-only handles, RemoveAll in cleanup.
      - linters: [errcheck]
        text: "Close"
      - linters: [errcheck]
        text: "os.RemoveAll"
      # Taint analysis false positive: paths are validated by safeguard.
      - linters: [gosec]
        text: "G703"
      # Unhandled errors in cleanup paths (RemoveAll, Close after error).
      - linters: [gosec]
        text: "G104"
      # Report generation uses fmt.Fprint* extensively; errors are returned
      # from the top-level function if the underlying writer fails.
      - linters: [errcheck]
        text: "fmt.Fprint"
        path: internal/report/
      # t.Fatal calls runtime.Goexit(), so tree is never nil past the nil check.
      # staticcheck does not model t.Fatal as a terminating call for SA5011.
      - linters: [staticcheck]
        text: "SA5011"
        path: integration/externaltools/

formatters:
  enable:
    - gofmt
    - goimports

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
